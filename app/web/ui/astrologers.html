<!DOCTYPE html>
<html lang="ml">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>താര ✦ — ജ്യോതിഷ വിദഗ്ധരെ കാണാം</title>
  <link rel="stylesheet" href="/static/ui/tara-ui.css?v=20260714a" />
</head>
<body data-case="default">
  <canvas id="starfield"></canvas>
  <div class="aurora"></div>
  <div class="grain"></div>

  <main class="astro-page">
    <!-- Primary sections (desktop pills; mobile bottom bar below) -->
    <nav class="tara-topnav" aria-label="വിഭാഗങ്ങൾ">
      <a href="/feed"><span aria-hidden="true">🏠</span> ഇന്ന്</a>
      <a href="/"><span aria-hidden="true">💬</span> ചാറ്റ്</a>
      <a href="/ui/astrologers" class="active"><span aria-hidden="true">🧑‍🏫</span> ജ്യോതിഷർ</a>
      <a href="/admin" class="admin-only admin-hidden"><span aria-hidden="true">📊</span> അഡ്മിൻ</a>
      <a href="/console" class="admin-only admin-hidden"><span aria-hidden="true">🛠️</span> കൺസോൾ</a>
    </nav>

    <header class="astro-head">
      <a class="astro-back" href="/ui">← സംഭാഷണത്തിലേക്ക്</a>
      <div class="astro-title">
        <h1><span class="star">✦</span> അനുഭവസമ്പന്നരായ ജ്യോതിഷ വിദഗ്ധർ</h1>
        <p class="astro-sub">നിങ്ങളുടെ ജില്ല തിരഞ്ഞെടുത്ത് സൗകര്യമുള്ള സമയം ബുക്ക് ചെയ്യാം · കൺസൾട്ടേഷൻ സൗജന്യം</p>
      </div>
      <select id="district-filter" class="astro-select" aria-label="ജില്ല">
        <option value="">എല്ലാ ജില്ലകളും</option>
        <option value="Thiruvananthapuram">തിരുവനന്തപുരം</option>
        <option value="Kollam">കൊല്ലം</option>
        <option value="Pathanamthitta">പത്തനംതിട്ട</option>
        <option value="Alappuzha">ആലപ്പുഴ</option>
        <option value="Kottayam">കോട്ടയം</option>
        <option value="Idukki">ഇടുക്കി</option>
        <option value="Ernakulam">എറണാകുളം</option>
        <option value="Thrissur">തൃശ്ശൂർ</option>
        <option value="Palakkad">പാലക്കാട്</option>
        <option value="Malappuram">മലപ്പുറം</option>
        <option value="Kozhikode">കോഴിക്കോട്</option>
        <option value="Wayanad">വയനാട്</option>
        <option value="Kannur">കണ്ണൂർ</option>
        <option value="Kasaragod">കാസർഗോഡ്</option>
      </select>
    </header>

    <section class="astro-mine" id="mine-section" hidden>
      <h2>എന്റെ ബുക്കിംഗുകൾ</h2>
      <div id="mine-list" class="mine-list"></div>
    </section>

    <section class="astro-grid" id="astro-grid" aria-live="polite"></section>
    <p class="astro-empty" id="astro-empty" hidden>ഈ ജില്ലയിൽ വിദഗ്ധരെ കണ്ടെത്താനായില്ല.</p>
  </main>

  <!-- booking drawer -->
  <div class="astro-drawer-scrim" id="drawer-scrim" hidden></div>
  <aside class="astro-drawer" id="drawer" hidden aria-modal="true" role="dialog">
    <button class="drawer-close" id="drawer-close" aria-label="അടയ്ക്കുക">✕</button>
    <div id="drawer-body"></div>
  </aside>

  <div class="astro-toast" id="toast" hidden></div>

  <!-- Mobile bottom navigation -->
  <nav class="tara-bottomnav" aria-label="വിഭാഗങ്ങൾ">
    <a href="/feed"><span class="ic" aria-hidden="true">🏠</span>ഇന്ന്</a>
    <a href="/"><span class="ic" aria-hidden="true">💬</span>ചാറ്റ്</a>
    <a href="/ui/astrologers" class="active"><span class="ic" aria-hidden="true">🧑‍🏫</span>ജ്യോതിഷർ</a>
    <a href="/admin" class="admin-only admin-hidden"><span class="ic" aria-hidden="true">📊</span>അഡ്മിൻ</a>
    <a href="/console" class="admin-only admin-hidden"><span class="ic" aria-hidden="true">🛠️</span>കൺസോൾ</a>
  </nav>

  <!-- Reveal admin/console nav for administrators (cache first, then verify). -->
  <script>
    (function () {
      function apply(on) {
        document.querySelectorAll(".admin-only").forEach(function (el) {
          el.classList.toggle("admin-hidden", !on);
        });
      }
      apply(localStorage.getItem("tara_is_admin") === "1");
      var token = localStorage.getItem("tara_token");
      if (!token) return;
      fetch("/identity/me", { headers: { Authorization: "Bearer " + token } })
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (p) {
          if (!p) return;
          if (p.is_admin) localStorage.setItem("tara_is_admin", "1");
          else localStorage.removeItem("tara_is_admin");
          apply(!!p.is_admin);
        })
        .catch(function () {});
    })();
  </script>

  <script src="/static/ui/starfield.js"></script>
  <script src="/static/ui/astrologers.js?v=20260711b"></script>
</body>
</html>
