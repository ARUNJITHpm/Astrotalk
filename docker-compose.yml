# Tara — local dev stack: Postgres + Redis + Mongo + API + Celery worker + Celery beat.
# Boots with no external API keys (every integration defaults to a mock).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tara
      POSTGRES_PASSWORD: tara
      POSTGRES_DB: tara
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tara"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 3000
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql+asyncpg://tara:tara@postgres:5432/tara
      REDIS_URL: redis://redis:6379/0
      MONGODB_URL: mongodb://mongo:27017
      MONGODB_DB: tara
      MOCK_MONGO: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy

  celery-worker:
    build: .
    command: celery -A app.platform.celery_app.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://tara:tara@postgres:5432/tara
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

  celery-beat:
    build: .
    command: celery -A app.platform.celery_app.celery_app beat --loglevel=info
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  mongo_data:
